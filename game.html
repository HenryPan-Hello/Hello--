<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Play</title><link rel="stylesheet" href="style.css"></head><body><a href="index.html">Back</a><h1 id="gameTitle"></h1><iframe id="frame" style="width:100%;height:80vh"></iframe><script>
const games=[{title:"Minecraft",folder:"minecraft"},{title:"Geometry Dash",folder:"geometry-dash"},{title:"Hollow Knight",folder:"hollow-knight"},{title:"Level Devil",folder:"LevelDevil-main"}];
const p=new URLSearchParams(location.search);const f=p.get("folder");
const g=games.find(x=>x.folder===f);
if(g){document.getElementById("gameTitle").innerText=g.title;document.getElementById("frame").src="games/"+g.folder+"/index.html";}
</script></body></html>
